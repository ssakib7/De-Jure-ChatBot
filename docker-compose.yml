services:
  bot:
    build: .
    image: dejure-fb-bot
    container_name: dejure-fb-bot
    restart: unless-stopped
    env_file:
      - .env
    # Bind to localhost only — the host's nginx reverse-proxies to it and
    # terminates TLS. Host port 3001 because 3000 is used by the Next.js app.
    ports:
      - "127.0.0.1:3001:3000"
